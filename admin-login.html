<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>ล็อกอินผู้ดูแลระบบ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; text-align: center; padding: 50px; }
form { background: white; display: inline-block; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
input { display: block; width: 280px; padding: 10px; margin: 10px auto; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
button { padding: 10px 22px; background: #005A9C; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight:700; }
button:hover { background: #004080; }
</style>
</head>
<body>
    <h2>เข้าสู่ระบบผู้ดูแล</h2>
    <form action="/admin/login" method="POST">
        <input type="text" name="username" placeholder="ชื่อผู้ใช้" required />
        <input type="password" name="password" placeholder="รหัสผ่าน" required />
        <button type="submit">ล็อกอิน</button>
    </form>
</body>
</html>
